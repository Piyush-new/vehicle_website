<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>commuter Bikes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>COMMUTER BIKES</h1>
  </header>

  <div class="container">
    <img src="0-arrow.png" class="arrow left" onclick="prevSlide()">
    <div class="frame">
      <div class="slider">
        
        <img src="37-Hero Splendor Plus.avif" alt="Hero Splendor Plus" class="image" onclick="openModal(this)">
         
                    <img src="38-Honda Shine.avif" alt="Honda Shine" class="image" onclick="openModal(this)">
                      
                    <img src="39-Bajaj Pulsar 150.jpg" alt="Bajaj Pulsar 150" class="image" onclick="openModal(this)">
                     
                    <img src="40-TVS Apache RTR 160.jpg" alt="TVS Apache RTR 160" class="image" onclick="openModal(this)">
                     
                    <img src="41---Yamaha MT 15 V2.jpg" alt="Yamaha MT 15 V2 " class="image" onclick="openModal(this)">
                     
                    <img src="42-Bajaj Pulsar NS200.jpg" alt="Bajaj Pulsar NS200" class="image" onclick="openModal(this)">
                     
                    <img src="43-TVS Raider 125.jpg" alt="TVS Raider 125" class="image" onclick="openModal(this)">
      </div>
    </div>
    <img src="0-arrow.png" class="arrow right" onclick="nextSlide()">
  </div>

  <div class="modal" id="imageModal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeModal()">&times;</span>
      <img id="modalImg">
      <p class="modal-description" id="modalDesc"></p>
    </div>
  </div>

  <script src="new-script.js"></script>
</body>
</html>
