<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>off-roading Bikes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>OFF-ROADING BIKES</h1>
  </header>

  <div class="container">
    <img src="0-arrow.png" class="arrow left" onclick="prevSlide()">
    <div class="frame">
      <div class="slider">
        
         <img src="44-Royal Enfield Himalayan 450.jpg" alt="Royal Enfield Himalayan 450" class="image" onclick="openModal(this)">
        
         <img src="45-Hero XPulse 210.jpeg" alt="Hero XPulse 210" class="image" onclick="openModal(this)">
        
         <img src="46---KTM 390 Adventure.jpg" alt="KTM 390 Adventure" class="image" onclick="openModal(this)">
         
         <img src="47-Yezdi Adventure.jpg" alt="Yezdi Adventure" class="image" onclick="openModal(this)">
        
         <img src="48-BMW R 1300 GS.jpg" alt="BMW R 1300 GS" class="image" onclick="openModal(this)">
         
         <img src="49-Kawasaki KX 250.jpeg" alt="Kawasaki KX 250" class="image" onclick="openModal(this)">
         
      </div>
    </div>
    <img src="0-arrow.png" class="arrow right" onclick="nextSlide()">
  </div>

  <div class="modal" id="imageModal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeModal()">&times;</span>
      <img id="modalImg">
      <p class="modal-description" id="modalDesc"></p>
    </div>
  </div>

  <script src="new-script.js"></script>
</body>
</html>
