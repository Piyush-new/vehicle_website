  <style>
    /* ========= General Styles ========= */
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f4f4;
      color: #333;
    }

    h2 {
      text-align: center;
      margin: 20px 0;
    }

    /* ========= Categories Container ========= */
    .categories {
      max-width: 1200px;
      margin: auto;
      padding: 10px;
    }

    /* ========= Each Category Container ========= */
    .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      overflow: hidden;
      margin: 20px 0;
      background: linear-gradient(to right, #222, #555);
      border-radius: 15px;
      padding: 20px;
    }

    /* ========= Arrow Styles ========= */
    .arrow {
      width: 50px;
      cursor: pointer;
    }
    .arrow.left {
      transform: rotate(180deg);
    }

    /* ========= Frame & Slider ========= */
    .frame {
      overflow: hidden;
      flex: 1;
      margin: 0 10px;
    }
    .slider {
      display: flex;
      gap: 10px;
      transition: transform 0.5s ease;
      overflow-x: auto;
      scroll-behavior: smooth;
    }
    .slider::-webkit-scrollbar {
      display: none;
    }

    /* ========= Image Styles ========= */
    .image {
      width: 200px;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      flex-shrink: 0;
    }
    .image:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    /* ========= Modal Styles ========= */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.8);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      max-width: 800px;
      width: 90%;
      text-align: center;
      position: relative;
      max-height: 90vh;
      overflow: auto;
    }
    .modal-content img {
      width: 100%;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 8px;
    }
    .modal-description {
      margin-top: 15px;
      font-size: 18px;
      color: #333;
    }
    .close-modal {
      position: absolute;
      top: 10px;
      right: 20px;
      font-size: 30px;
      cursor: pointer;
      background: transparent;
      border: none;
      color: #333;
    }
    .close-modal:hover {
      color: red;
    }
  </style>
</head>

  <!-- Modal for Enlarged Image -->
  <div class="modal" id="imageModal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeModal()">&times;</span>
      <img id="modalImg" alt="Enlarged Image">
      <p class="modal-description" id="modalDesc"></p>
    </div>
  </div>
  
  <script>
    // Scroll-based slider functions:
    function nextSlide(arrow) {
      const container = arrow.closest('.container');
      const slider = container.querySelector('.slider');
      slider.scrollBy({ left: 210, behavior: 'smooth' });
    }
    
    function prevSlide(arrow) {
      const container = arrow.closest('.container');
      const slider = container.querySelector('.slider');
      slider.scrollBy({ left: -210, behavior: 'smooth' });
    }
    
    // Modal functions:
    function openModal(imgElem) {
      const modal = document.getElementById('imageModal');
      const modalImg = document.getElementById('modalImg');
      const modalDesc = document.getElementById('modalDesc');
      modal.style.display = 'flex';
      modalImg.src = imgElem.src;
      modalDesc.textContent = imgElem.alt;
    }
    
    function closeModal() {
      document.getElementById('imageModal').style.display = 'none';
    }
    
    // Optional: Keyboard arrow support for the first slider as an example.
    document.addEventListener('keydown', (e) => {
      if (document.getElementById('imageModal').style.display !== 'flex') {
        const firstSlider = document.querySelector('.slider');
        if (e.key === 'ArrowRight') {
          firstSlider.scrollBy({ left: 210, behavior: 'smooth' });
        } else if (e.key === 'ArrowLeft') {
          firstSlider.scrollBy({ left: -210, behavior: 'smooth' });
        }
      }
    });
  </script>
